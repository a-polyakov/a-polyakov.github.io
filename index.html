                cv.work[0].position = "Software Development Engineer in Test";
                cv.work[0].highlights[0] = "Increase automated test coverage, implemented UI test automation using Playwright and strengthen CI checks to reduce regressions and improve release safety, contributing to continuous improvement.";

                cv.work[0].highlights.splice(3, 1)
                // cv.work[0].highlights[4] = cv.work[0].highlights[4].replace("Rewrote", "Covered")
                cv.work[0].highlights[3] += " Followed a test-first (TDD) approach."
                cv.work[0].highlights.splice(6, 3)
                cv.work[1].position = "Senior Java Developer in Test"; //GridGain
                cv.work[1].highlights[3] = cv.work[1].highlights[3].replace("(QA, DevOps, Support) ", "");
                cv.work[2].position = "Senior Java Developer"; // BIA-Technologies

                cv.skills.splice(6, 1);
                cv.work[6].highlights.splice(2, 1);
                cv.work[9].hide = false;
                cv.work[10].hide = false;
            }
            renderBasics(cv.basics);
            renderSkills(cv.skills);
            renderCertificates(cv.certificates);
            renderWork(cv.work);
            renderEducation(cv.education);
        }

        function renderBasics(basics) {
            document.getElementById("user_name").textContent = basics.name;

            document.getElementById("position_name").textContent = basics.label;

            const userPhone = document.getElementById("user_phone");
            userPhone.setAttribute("href", "tel://+" + basics.phone.replace(/\D/g, ''))
            userPhone.textContent += basics.phone;

            const userEmail = document.getElementById("user_email");
            userEmail.setAttribute("href", "mailto://" + basics.email)
            userEmail.textContent += basics.email;

            const userLinkedin = document.getElementById("user_linkedin");
            const linkedinUrl = basics.profiles.find(p => p.network === "LinkedIn")?.url;
            const linkedinLabel = basics.profiles.find(p => p.network === "LinkedIn")?.username;
            userLinkedin.setAttribute("href", linkedinUrl)
            userLinkedin.textContent += linkedinLabel;

            document.getElementById("user_address").textContent = basics.location.country + ", " + basics.location.region + ", " + basics.location.city;

            document.getElementById("overview").textContent = basics.overview;

            document.getElementById("summary").textContent = basics.summary;
        }

        function renderSkills(skills) {
            const ul = document.getElementById("skills");
            skills.forEach(s => {
                const li = document.createElement("li");
                const keywords = Array.isArray(s?.keywords) ? s.keywords : [];
                li.innerHTML = `${s.name}: ${keywords.join(", ")}`;
                ul.appendChild(li);
            });
        }

        function renderCertificates(certificates) {
            const container = document.getElementById("certificates");
            certificates.forEach(c => {
                const div = document.createElement("div");
                const nameHtml = c.url ? `<a href="${c.url}">${c.name}</a>` : c.name;
                div.innerHTML = `<b>${c.issuer}</b>, ${c.date}, ${nameHtml}<br/>`;
                container.appendChild(div);
            });
        }

        function renderWork(works) {
            const container = document.getElementById("works");
            works.forEach(work => {
                if (!work.hide) {
                    const div = document.createElement("div");
                    if (work.noBreak) {
                        div.className = "noBreak";
                    }
                    let endDate = work.endDate ? dateFormat(work.endDate) : "Present";
                    if (work.additionalDate) {
                        endDate += ` (${work.additionalDate})`;
                    }
                    let nameHtml = (work.name.includes('"') || "Private customer" == work.name) ? work.name : `"${work.name}"`;
                    if (work.url) {
                        nameHtml = `<a href="${work.url}">${nameHtml}</a>`;
                    }
                    div.innerHTML = `<b>${work.position}</b>, ${nameHtml} <span class="job-date">${dateFormat(work.startDate)} - ${endDate}</span><br/>`;
                    const ul = document.createElement("ul");
                    work.highlights.forEach(item => {
                        const li = document.createElement("li");
                        li.innerHTML = item;
                        ul.appendChild(li);
                    })
                    div.appendChild(ul);
                    div.appendChild(document.createElement("br"));
                    container.appendChild(div);
                }
            });
        }

        function renderEducation(education) {
            const container = document.getElementById("education");
            education.forEach(item => {
                const div = document.createElement("div");
                div.innerHTML = `<a href="${item.url}">${item.institution}</a>, ${item.startDate}-${item.endDate}<br/>
Specialty: ${item.area}<br/>
${item.studyType}<br/>
`;
                item.courses.forEach(course => {
                    div.innerHTML += course;
                })
                container.appendChild(div);
            });
        }

        /**
         * @param input "2015-04"
         */
        function dateFormat(input) {
            const [year, month] = input.split('-');
            const date = new Date(year, month - 1);

            return date.toLocaleString('en-US', {
                month: 'long',
                year: 'numeric'
            });
        }
    </script>
